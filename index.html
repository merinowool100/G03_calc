<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=5"
    />
    <link rel="stylesheet" href="./html/css/reset.css" />
    <link rel="stylesheet" href="./html/css/toppage.css" />
    <script src="./html/js/levels-config.js"></script>
    <title>Calc.</title>
  </head>

  <body>
    <div id="wrap">
      <div id="topPageTitle">Calc.</div>
      <div id="l-container">
        <div id="container"></div>
      </div>
    </div>
    <script>
      const container = document.getElementById("container");
      function menuOrder(id) {
        if (id <= 6) return id;
        if (id === 8) return 7;
        if (id === 9) return 8;
        if (id === 7) return 9;
        return id;
      }

      const levels = Object.keys(window.LEVEL_DEFS)
        .map(Number)
        .sort((a, b) => menuOrder(a) - menuOrder(b));

      levels.forEach((level) => {
        const def = window.LEVEL_DEFS[level];
        const button = document.createElement("button");
        button.className = "level-card";
        button.type = "button";
        const badge = document.createElement("span");
        badge.className = "level-card__badge";
        badge.textContent = def.label;
        const summary = document.createElement("span");
        summary.className = "level-card__summary";
        summary.textContent = def.summary || "";
        button.appendChild(badge);
        button.appendChild(summary);
        button.addEventListener("click", () => {
          window.location.href = "./html/play.html?level=" + level;
        });
        container.appendChild(button);
      });
    </script>
  </body>
</html>
