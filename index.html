<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=5"
    />
    <link rel="stylesheet" href="./html/css/reset.css" />
    <link rel="stylesheet" href="./html/css/toppage.css" />
    <script src="./html/js/levels-config.js"></script>
    <title>Calc.</title>
  </head>

  <body>
    <div id="wrap">
      <div id="topPageTitle">Calc.</div>
      <div id="l-container">
        <div id="container"></div>
      </div>
    </div>
    <script>
      const container = document.getElementById("container");
      const levels = Object.keys(window.LEVEL_DEFS)
        .map(Number)
        .sort((a, b) => a - b);

      levels.forEach((level) => {
        const button = document.createElement("button");
        button.className = "btn";
        button.type = "button";
        button.textContent = window.LEVEL_DEFS[level].label;
        button.addEventListener("click", () => {
          window.location.href = "./html/play.html?level=" + level;
        });
        container.appendChild(button);
      });
    </script>
  </body>
</html>
