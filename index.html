<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=5"
    />
    <link rel="stylesheet" href="./html/css/reset.css" />
    <link rel="stylesheet" href="./html/css/toppage.css" />
    <script src="./html/js/levels-config.js"></script>
    <title>Calc.</title>
  </head>

  <body>
    <div id="wrap">
      <div id="topPageTitle">Calc.</div>
      <div id="l-container">
        <div id="menu-container">
          <section class="menu-section">
            <h2 class="menu-section__title">イメトレ</h2>
            <div
              class="menu-section__grid menu-section__grid--single"
              id="imagetore-menu"
            ></div>
          </section>
          <section class="menu-section">
            <h2 class="menu-section__title">九九マスター</h2>
            <div class="menu-section__grid" id="master-menu"></div>
          </section>
        </div>
      </div>
    </div>
    <script>
      const MODES = window.GAME_MODES;

      function createModeCard(modeId, def) {
        const button = document.createElement("button");
        button.className = "level-card";
        button.type = "button";
        const badge = document.createElement("span");
        badge.className = "level-card__badge";
        badge.textContent = def.label;
        const summary = document.createElement("span");
        summary.className = "level-card__summary";
        summary.textContent = def.summary || "";
        button.appendChild(badge);
        button.appendChild(summary);
        button.addEventListener("click", () => {
          window.location.href = "./html/play.html?mode=" + modeId;
        });
        return button;
      }

      const imagetoreMenu = document.getElementById("imagetore-menu");
      imagetoreMenu.appendChild(createModeCard("imagetore", MODES.imagetore));

      const masterMenu = document.getElementById("master-menu");
      for (let table = 2; table <= 9; table++) {
        const modeId = "master" + table;
        masterMenu.appendChild(createModeCard(modeId, MODES[modeId]));
      }
    </script>
  </body>
</html>
