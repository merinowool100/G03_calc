<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=5"
    />
    <link rel="stylesheet" href="./css/reset.css" />
    <link rel="stylesheet" href="./css/style.css" />
    <title>Calc</title>
  </head>

  <body>
    <div id="wrap">
      <div id="left-container">
        <div id="container">
          <div class="left-panel-stack">
            <div class="header">
              <div id="top">
                <span class="level-badge">Lv.1</span>
              </div>
              <div id="nokori" class="meta-label">Rem.</div>
              <div id="remainingDisplay" class="meta-value">10</div>
              <div id="timer-display" class="timer-value">00:00:00</div>
              <div id="best-record" class="best-record">Best: 00:00:00</div>
            </div>
            <div id="feedback"></div>
            <div id="canvas-container">
              <canvas class="canvas"></canvas>
            </div>
          </div>
        </div>
      </div>
      <div id="right-container">
        <div id="container2">
          <div id="container2-sub">
            <div id="problemDisplayContainer">
              <div id="problemDisplay"></div>
              <div id="answerArea">
                <input type="text" id="answerInput" readonly placeholder="" />
              </div>
            </div>
            <div class="panel-gap"></div>
            <div id="numberButtons">
              <button type="button" class="numbtn" id="btn7">7</button>
              <button type="button" class="numbtn" id="btn8">8</button>
              <button type="button" class="numbtn" id="btn9">9</button>
              <button type="button" class="numbtn" id="btn4">4</button>
              <button type="button" class="numbtn" id="btn5">5</button>
              <button type="button" class="numbtn" id="btn6">6</button>
              <button type="button" class="numbtn" id="btn1">1</button>
              <button type="button" class="numbtn" id="btn2">2</button>
              <button type="button" class="numbtn" id="btn3">3</button>
              <button type="button" class="numbtn" id="btn0">0</button>
              <button type="button" class="btn" id="submitAnswerButton">
                Answer
              </button>
              <button type="button" class="btn" id="back">Back</button>
              <button type="button" class="btn" id="toggleStartButton">
                Start
              </button>
              <button type="button" class="btn" id="clearButton">C</button>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script src="./js/levels-config.js"></script>
    <script src="./js/game.js"></script>
  </body>
</html>
